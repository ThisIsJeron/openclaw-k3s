image:
  # Public default image. Override for your own registry/build.
  repository: ghcr.io/YOUR_GITHUB_ORG/openclaw
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent
  bakedTools: true
  pullSecrets: []

# Versions of the channel plugins baked into the image. Kept in sync with
# the Dockerfile build args; seed-plugins uses this to detect drift between
# what's in the image and what's already on the PVC.
seedPlugins:
  image: busybox:1.36
  versions:
    discord: "2026.5.7"
    brave-plugin: "2026.5.7"

replicaCount: 1

# Resource requests/limits for the gateway container. Conservative
# defaults — tune from actual Prometheus usage once the metrics stack
# has a few days of data. The Node.js gateway plus loaded plugins
# (Discord, Slack, brave, etc.) sits around 200-400Mi in steady state;
# the headroom is for plugin garbage collection and short bursts.
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# PodDisruptionBudget for the gateway. With replicas=1, minAvailable=1
# means voluntary disruption (node drain, eviction) is blocked unless
# a human approves it via --disable-eviction or scaling the deployment
# down explicitly. That matches the chat-singleton constraint — we
# don't want a casual `kubectl drain` to drop the bot off Discord.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

runtimeTools:
  enabled: true
  image: debian:12-slim
  debianPackages:
    - jq
    - openssh-client
  todoist:
    enabled: true
    package: todoist-ts-cli
    version: "0.2.0"
  kubectl:
    enabled: true
    version: "v1.34.2"
  helm:
    enabled: true
    version: "v3.20.2"
  argocd:
    enabled: true
    version: "v3.4.1"

service:
  type: ClusterIP
  port: 18789

kube-prometheus-stack:
  enabled: true
  fullnameOverride: openclaw-monitoring
  defaultRules:
    rules:
      # k3s does not expose these control-plane scrape targets in this k3s deployment,
      # so the stock kube-prometheus target-down alerts are permanent noise.
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
  # CRDs are already installed. Do not keep managing giant Prometheus CRDs
  # through Argo client-side apply; their last-applied annotations exceed
  # Kubernetes' 256KiB metadata annotation limit. Existing CRDs remain because
  # the Argo Application deliberately does not prune.
  crds:
    enabled: false
  alertmanager:
    enabled: true
    alertmanagerSpec:
      # emptyDir storage — Alertmanager state survives within a pod
      # lifetime but not across restarts. Sufficient only as a temporary bridge since
      # alerts re-fire on the next Prometheus scrape anyway.
      storage: {}
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    # Discord delivery uses an in-cluster webhook adapter because Discord's
    # webhook body format is not compatible with Alertmanager's native
    # webhook_configs JSON. The relay is gated by
    # monitoring.alertmanager.discord.enabled below and reads the Discord
    # webhook URL from the openclaw-alertmanager-discord Secret.
    config:
      route:
        group_by: ["alertname", "severity"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
      receivers:
        - name: "null"
  grafana:
    enabled: true
    fullnameOverride: openclaw-grafana
    admin:
      existingSecret: openclaw-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsTimezone: UTC
    service:
      type: ClusterIP
    ingress:
      enabled: false
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 7d
      storageSpec: {}

gitopsGuard:
  enabled: true
  image: alpine/k8s:1.34.1
  schedule: "* * * * *"
  suspend: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  promoteAfterSeconds: 600
  rollbackAfterSeconds: 180
  appNamespace: argocd
  appName: openclaw
  targetNamespace: openclaw
  deploymentName: openclaw
  serviceName: openclaw
  servicePort: 18789
  lkgConfigMapName: openclaw-last-known-good
  alerts:
    discord:
      enabled: false
      channelId: ""
      tokenSecretName: openclaw-secrets
      tokenSecretKey: DISCORD_BOT_TOKEN

monitoring:
  alertmanager:
    # Optional Discord relay adapter. Disabled in the public defaults.
    discord:
      enabled: false
      image:
        repository: benjojo/alertmanager-discord
        tag: latest
      webhookSecretName: openclaw-alertmanager-discord
      webhookSecretKey: webhook-url
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  publicAccess:
    cloudflared:
      enabled: false
      image: cloudflare/cloudflared:2025.11.1
      target: http://openclaw-grafana.openclaw.svc.cluster.local:80
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    ngrok:
      enabled: false
      image: ngrok/ngrok:3
      existingSecret: openclaw-grafana-ngrok
      authtokenKey: NGROK_AUTHTOKEN
      target: http://openclaw-grafana:80
      domain: ""
      region: ""

probes:
  startup:
    enabled: true
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 2
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

persistence:
  enabled: true
  size: 10Gi
  storageClassName: ""

# Off-host PVC backup via kopia (BACKUP-STRATEGY.md Phase 2).
# Disabled by default — flipping to enabled=true requires the
# openclaw-backup-secrets Secret (kopia repo password + S3-compatible
# credentials) in the openclaw namespace. See docs/RESTORE-DRILL.md.
backup:
  enabled: false
  image: kopia/kopia:0.18.1
  # Every 6 hours, offset 11 minutes so it doesn't collide with the
  # DR-export cron (20 3,15) or anything starting on the hour.
  schedule: "11 */6 * * *"
  # Where kopia stores backups. s3://, b2://, gcs://, sftp:// all work.
  # Use a per-host prefix so multiple clusters don't clobber each other.
  repository: ""           # e.g. s3://openclaw-backups/k3s-prod
  retention:
    keepHourly: 8          # 2 days of 6-hourly = 8 snapshots
    keepDaily: 7
    keepWeekly: 4
    keepMonthly: 6
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Secret must contain:
  #   KOPIA_PASSWORD            — repository encryption password
  #   AWS_ACCESS_KEY_ID         — S3-compatible access key (for s3://)
  #   AWS_SECRET_ACCESS_KEY     — S3-compatible secret key (for s3://)
  #   AWS_S3_ENDPOINT           — optional, for non-AWS S3 (B2/R2/MinIO)
  secretName: openclaw-backup-secrets

gogcli:
  # Optional Google Calendar CLI integration. Keep disabled unless you provide
  # your own Kubernetes Secret and account-specific token paths.
  enabled: false
  image:
    repository: ghcr.io/steipete/gogcli
    digest: sha256:113e878719a30394049922364ee59daad5e7ffd70e78acd0b224c8be98c41831
    pullPolicy: IfNotPresent
  secretName: openclaw-secrets
  secretFiles: []

config:
  gateway:
    port: 18789
    bind: lan
    reload:
      mode: hybrid
  # Public defaults intentionally start with no chat channels enabled.
  # See examples/values.discord.yaml and examples/values.slack.yaml.
  channels: {}
  plugins:
    allow:
      - openai
      - memory-core
      - browser
      - device-pair
      - file-transfer
      - phone-control
      - talk-voice
      - brave
    entries:
      openai:
        enabled: true
      brave:
        enabled: true
  agents:
    defaults:
      model:
        primary: openai/gpt-5.5
  tools:
    web:
      search:
        enabled: true
        provider: brave
    elevated:
      enabled: false
      allowFrom: {}

workspace:
  enabled: true
  projects: []
