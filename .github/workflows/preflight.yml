name: GitOps preflight

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.20.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: scripts/preflight-gitops.sh
