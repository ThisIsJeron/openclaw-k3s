name: Build OpenClaw image

on:
  push:
    branches: [main]
    paths:
      - chart/openclaw/image/**
      - .github/workflows/image.yml
  pull_request:
    paths:
      - chart/openclaw/image/**
      - .github/workflows/image.yml
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          {
            echo "short_sha=${short_sha}"
            echo "image=${REGISTRY}/${IMAGE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: chart/openclaw/image
          file: chart/openclaw/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.short_sha }}
            ${{ steps.tags.outputs.image }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max,ignore-error=true

      - name: Summarize
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Image published"
            echo ""
            echo '```'
            echo "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.short_sha }}"
            echo "${{ steps.tags.outputs.image }}:${{ github.ref_name }}"
            echo ""
            echo "digest: ${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
